<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>2D Convolution Visualizer</title>
<style>
  :root{
    --bg:#12181f;
    --panel:#1b2430;
    --accent:#4fd1c5;
    --text:#e6edf3;
    --muted:#8b98a5;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI', system-ui, sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 16px 40px;
  }
  h1{font-size:1.4rem;margin:0 0 4px;}
  p.sub{color:var(--muted);margin:0 0 20px;font-size:.9rem;text-align:center;max-width:600px;}
  .panel{
    background:var(--panel);
    border-radius:12px;
    padding:20px;
    width:100%;
    max-width:900px;
    box-shadow:0 6px 24px rgba(0,0,0,.35);
  }
  .controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center;}
  select, button, input[type=range]{
    background:#0f1620;color:var(--text);border:1px solid #2a3644;
    border-radius:6px;padding:8px 12px;font-size:.9rem;
  }
  button{cursor:pointer;background:var(--accent);color:#0b1116;font-weight:600;border:none;}
  button:disabled{opacity:.5;cursor:not-allowed;}
  .layout{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;align-items:flex-start;}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .col h3{margin:0;font-size:.85rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
  .grid{display:grid;gap:2px;background:#2a3644;padding:2px;border-radius:4px;}
  .cell{
    width:22px;height:22px;display:flex;align-items:center;justify-content:center;
    font-size:.62rem;color:#0b1116;font-weight:600;background:#3a4552;
    transition:background .15s ease, outline .15s ease;
  }
  .cell.kernel-active{outline:2px solid #f59e0b;outline-offset:-2px;z-index:2;}
  .cell.output-active{outline:3px solid #4fd1c5;outline-offset:-2px;}
  .arrow{font-size:1.6rem;color:var(--muted);align-self:center;margin-top:60px;}
  .mathline{
    margin-top:16px;font-size:.85rem;color:var(--muted);
    background:#0f1620;padding:10px 14px;border-radius:8px;
    max-width:100%;overflow-x:auto;white-space:nowrap;
  }
  .mathline b{color:var(--accent);}
</style>
</head>
<body>

<h1>2D Convolution Visualizer</h1>
<p class="sub">See how a kernel slides over an image, multiplies overlapping values, and sums them into one output pixel — the core idea behind blur, sharpen, and edge-detection filters.</p>

<div class="panel">
  <div class="controls">
    <select id="kernelChoice">
      <option value="edge">Edge Detection</option>
      <option value="sharpen">Sharpen</option>
      <option value="blur">Box Blur</option>
      <option value="identity">Identity</option>
    </select>
    <label>Speed:
      <input type="range" id="speed" min="1" max="100" value="55">
    </label>
    <button id="start">▶ Start Convolution</button>
    <button id="reset">Reset</button>
  </div>

  <div class="layout">
    <div class="col">
      <h3>Input Image (7×7)</h3>
      <div class="grid" id="inputGrid" style="grid-template-columns:repeat(7,22px);"></div>
    </div>
    <div class="arrow">✳</div>
    <div class="col">
      <h3>Kernel (3×3)</h3>
      <div class="grid" id="kernelGrid" style="grid-template-columns:repeat(3,22px);"></div>
    </div>
    <div class="arrow">=</div>
    <div class="col">
      <h3>Output (5×5)</h3>
      <div class="grid" id="outputGrid" style="grid-template-columns:repeat(5,22px);"></div>
    </div>
  </div>

  <div class="mathline" id="mathline">Press Start to begin sliding the kernel.</div>
</div>

<script>
const kernels = {
  edge:     [[-1,-1,-1],[-1,8,-1],[-1,-1,-1]],
  sharpen:  [[0,-1,0],[-1,5,-1],[0,-1,0]],
  blur:     [[1/9,1/9,1/9],[1/9,1/9,1/9],[1/9,1/9,1/9]],
  identity: [[0,0,0],[0,1,0],[0,0,0]]
};

// simple 7x7 sample "image" (grayscale values 0-9 for readability)
const image = [
  [1,1,1,2,3,3,3],
  [1,2,2,3,4,4,3],
  [1,2,5,6,6,4,3],
  [2,3,6,9,6,3,2],
  [3,4,6,6,5,2,1],
  [3,4,4,3,2,2,1],
  [3,3,3,2,1,1,1]
];

const inputGrid = document.getElementById('inputGrid');
const kernelGrid = document.getElementById('kernelGrid');
const outputGrid = document.getElementById('outputGrid');
const mathline = document.getElementById('mathline');
const startBtn = document.getElementById('start');
const resetBtn = document.getElementById('reset');
const kernelChoice = document.getElementById('kernelChoice');
const speedEl = document.getElementById('speed');

let running = false;
let outputVals = [];

function colorFor(v){
  const clamped = Math.max(0, Math.min(9, v));
  const lightness = 25 + clamped*7;
  return `hsl(190, 35%, ${lightness}%)`;
}

function buildInputGrid(){
  inputGrid.innerHTML = '';
  for(let r=0;r<7;r++){
    for(let c=0;c<7;c++){
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `in-${r}-${c}`;
      cell.textContent = image[r][c];
      cell.style.background = colorFor(image[r][c]);
      inputGrid.appendChild(cell);
    }
  }
}

function buildKernelGrid(){
  const k = kernels[kernelChoice.value];
  kernelGrid.innerHTML = '';
  for(let r=0;r<3;r++){
    for(let c=0;c<3;c++){
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `k-${r}-${c}`;
      const val = k[r][c];
      cell.textContent = Number.isInteger(val) ? val : val.toFixed(2);
      cell.style.background = val < 0 ? '#7f1d1d' : (val > 1 ? '#065f46' : '#3a4552');
      kernelGrid.appendChild(cell);
    }
  }
}

function buildOutputGrid(){
  outputGrid.innerHTML = '';
  outputVals = Array.from({length:5}, () => Array(5).fill(null));
  for(let r=0;r<5;r++){
    for(let c=0;c<5;c++){
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `out-${r}-${c}`;
      cell.textContent = '';
      cell.style.background = '#3a4552';
      outputGrid.appendChild(cell);
    }
  }
}

function clearHighlights(){
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('kernel-active','output-active'));
}

function delay(){
  const s = +speedEl.value;
  return new Promise(res => setTimeout(res, 620 - s*5));
}

async function runConvolution(){
  const k = kernels[kernelChoice.value];
  for(let outR=0; outR<5; outR++){
    for(let outC=0; outC<5; outC++){
      clearHighlights();
      let sum = 0;
      let terms = [];
      for(let kr=0; kr<3; kr++){
        for(let kc=0; kc<3; kc++){
          const ir = outR + kr, ic = outC + kc;
          document.getElementById(`in-${ir}-${ic}`).classList.add('kernel-active');
          document.getElementById(`k-${kr}-${kc}`).classList.add('kernel-active');
          const prod = image[ir][ic] * k[kr][kc];
          sum += prod;
          terms.push(`(${image[ir][ic]}×${Number.isInteger(k[kr][kc])?k[kr][kc]:k[kr][kc].toFixed(2)})`);
        }
      }
      mathline.innerHTML = `Output[${outR}][${outC}] = ${terms.join(' + ')} = <b>${sum.toFixed(2)}</b>`;
      await delay();
      const outCell = document.getElementById(`out-${outR}-${outC}`);
      outCell.textContent = sum.toFixed(1);
      outCell.style.background = colorFor(sum);
      outCell.classList.add('output-active');
      await delay();
    }
  }
  clearHighlights();
  mathline.innerHTML = 'Convolution complete ✓ — every output pixel is a weighted sum of its neighborhood.';
}

startBtn.addEventListener('click', async () => {
  if(running) return;
  running = true;
  startBtn.disabled = true;
  buildOutputGrid();
  await runConvolution();
  running = false;
  startBtn.disabled = false;
});

resetBtn.addEventListener('click', () => {
  if(running) return;
  buildOutputGrid();
  clearHighlights();
  mathline.textContent = 'Press Start to begin sliding the kernel.';
});

kernelChoice.addEventListener('change', () => {
  if(running) return;
  buildKernelGrid();
  buildOutputGrid();
  mathline.textContent = 'Press Start to begin sliding the kernel.';
});

buildInputGrid();
buildKernelGrid();
buildOutputGrid();
</script>
</body>
</html>
