<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Neighborhood Visualizer</title>
<style>
  body {
    background-color: #ffffff;
    color: #000000;
    font-family: monospace;
    padding: 20px;
    margin: 0;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 5px;
  }
  p {
    margin: 0 0 25px 0;
    font-size: 0.9rem;
  }
  .layout {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
  }
  .col {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .col h3 {
    margin: 0 0 10px 0;
    font-size: 0.9rem;
    text-align: center;
  }
  .grid-border {
    border: 2px solid #000000;
    background: #000000;
    padding: 2px;
  }
  .grid {
    display: grid;
    gap: 1px;
    grid-template-columns: repeat(5, 34px);
  }
  .cell {
    width: 34px;
    height: 34px;
    background: #ffffff;
    color: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: bold;
    cursor: crosshair;
    user-select: none;
  }
  /* High contrast black and white state indicators */
  .cell.center-pixel {
    background: #000000 !important;
    color: #ffffff !important;
  }
  .cell.neighbor-pixel {
    background: #ffffff !important;
    color: #000000 !important;
    outline: 2px dashed #000000;
    outline-offset: -2px;
  }
  .legend {
    margin-top: 30px;
    padding: 10px;
    border: 2px solid #000000;
    display: inline-flex;
    gap: 20px;
    font-size: 0.85rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .box {
    width: 16px;
    height: 16px;
    border: 1px solid #000000;
  }
</style>
</head>
<body>

<h1>Pixel Neighborhood Visualizer</h1>
<p>Hover your mouse over any cell in the grids to shift the center pixel (P) and observe its neighboring pixels (N).</p>

<div class="layout">
  <div class="col">
    <h3>4-Neighborhood<br>N₄(p)</h3>
    <div class="grid-border">
      <div class="grid" id="gridN4"></div>
    </div>
  </div>
  
  <div class="col">
    <h3>8-Neighborhood<br>N₈(p)</h3>
    <div class="grid-border">
      <div class="grid" id="gridN8"></div>
    </div>
  </div>
  
  <div class="col">
    <h3>Diagonal Neighborhood<br>N_D(p)</h3>
    <div class="grid-border">
      <div class="grid" id="gridND"></div>
    </div>
  </div>
</div>

<div class="legend">
  <div class="legend-item">
    <div class="box" style="background: #000000;"></div>
    <span>(P) Center Pixel</span>
  </div>
  <div class="legend-item">
    <div class="box" style="background: #ffffff; border: 2px dashed #000000;"></div>
    <span>(N) Neighbor Pixel</span>
  </div>
</div>

<script>
const ROWS = 5;
const COLS = 5;

// Build the structures for all three grids
function initGrids() {
  createGridElements('gridN4');
  createGridElements('gridN8');
  createGridElements('gridND');
  
  // Set default highlight state at center coordinates (2,2)
  updateVisuals(2, 2);
}

function createGridElements(gridId) {
  const container = document.getElementById(gridId);
  container.innerHTML = '';
  
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = r;
      cell.dataset.col = c;
      
      // Wire up hover event listeners to trigger synchronization across grids
      cell.addEventListener('mouseenter', () => {
        updateVisuals(r, c);
      });
      
      container.appendChild(cell);
    }
  }
}

function updateVisuals(centerR, centerC) {
  // Definition rules for structural relationships
  const rules = {
    'gridN4': (r, c) => (Math.abs(r - centerR) === 1 && c === centerC) || (Math.abs(c - centerC) === 1 && r === centerR),
    'gridN8': (r, c) => (Math.abs(r - centerR) <= 1 && Math.abs(c - centerC) <= 1) && !(r === centerR && c === centerC),
    'gridND': (r, c) => Math.abs(r - centerR) === 1 && Math.abs(c - centerC) === 1
  };

  // Loop through and evaluate elements across all three container domains
  Object.keys(rules).forEach(gridId => {
    const cells = document.getElementById(gridId).children;
    
    for (let i = 0; i < cells.length; i++) {
      const cell = cells[i];
      const r = parseInt(cell.dataset.row);
      const c = parseInt(cell.dataset.col);
      
      // Clean previous loop classes
      cell.className = 'cell';
      cell.textContent = '';
      
      if (r === centerR && c === centerC) {
        cell.classList.add('center-pixel');
        cell.textContent = 'P';
      } else if (rules[gridId](r, c)) {
        cell.classList.add('neighbor-pixel');
        cell.textContent = 'N';
      } else {
        // Display relative displacement matrix coordinates
        let relR = r - centerR;
        let relC = c - centerC;
        cell.textContent = `${relR},${relC}`;
      }
    }
  });
}

// Generate UI grids upon execution
initGrids();
</script>

</body>
</html>
