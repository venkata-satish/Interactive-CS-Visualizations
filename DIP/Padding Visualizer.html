<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Convolution Padding Visualizer</title>
<style>
  body {
    background-color: #ffffff;
    color: #000000;
    font-family: monospace;
    padding: 20px;
    margin: 0;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 5px;
  }
  p.sub {
    margin: 0 0 25px 0;
    font-size: 0.9rem;
  }
  .controls {
    margin-bottom: 20px;
    padding: 10px;
    border: 2px solid #000000;
    display: inline-block;
  }
  button, select {
    background: #ffffff;
    color: #000000;
    border: 2px solid #000000;
    padding: 5px 10px;
    font-family: monospace;
    font-weight: bold;
    cursor: pointer;
  }
  button:disabled {
    border-style: dotted;
    cursor: not-allowed;
  }
  .layout {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    align-items: flex-start;
  }
  .col {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .col h3 {
    margin: 0 0 10px 0;
    font-size: 0.9rem;
  }
  .grid-border {
    border: 2px solid #000000;
    background: #000000;
    padding: 2px;
  }
  .grid {
    display: grid;
    gap: 1px;
  }
  .cell {
    width: 32px;
    height: 32px;
    background: #ffffff;
    color: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: bold;
    transition: background 0.1s;
  }
  /* B&W High contrast states */
  .cell.original {
    background: #eeeeee;
  }
  .cell.padded {
    background: #ffffff;
    outline: 1px dashed #777777;
    outline-offset: -2px;
  }
  .cell.kernel-active {
    background: #000000 !important;
    color: #ffffff !important;
  }
  .cell.out-active {
    outline: 2px dashed #000000;
    outline-offset: -3px;
  }
  .mathline {
    margin-top: 25px;
    padding: 10px;
    border: 2px solid #000000;
    width: 650px;
    min-height: 35px;
    box-sizing: border-box;
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<h1>Convolution Padding Visualizer</h1>
<p class="sub">Observe how the choice of padding changes the dimensions of the input landscape and the size of the produced output feature map (using a 3×3 kernel).</p>

<div class="controls">
  <label>Padding Type: </label>
  <select id="paddingMode">
    <option value="valid">Valid (No Padding / P=0)</option>
    <option value="same">Same (Zero Padding / P=1)</option>
    <option value="full">Full (Max Padding / P=2)</option>
  </select>
  <button id="startBtn">▶ Step Through</button>
  <button id="resetBtn">Reset</button>
</div>

<div class="layout">
  <div class="col">
    <h3 id="inputTitle">Input Image</h3>
    <div class="grid-border">
      <div class="grid" id="inputGrid"></div>
    </div>
  </div>

  <div class="col">
    <h3 id="outputTitle">Output Map</h3>
    <div class="grid-border">
      <div class="grid" id="outputGrid"></div>
    </div>
  </div>
</div>

<div class="mathline" id="mathline">Select a mode and press 'Step Through' to slide the 3×3 kernel window.</div>

<script>
// Base Configuration
const SRC_ROWS = 5;
const SRC_COLS = 5;
const K_SIZE = 3;

// Mock 5x5 data image matrix
const baseImage = [
  [1, 2, 0, 1, 3],
  [0, 1, 4, 2, 0],
  [3, 0, 1, 1, 2],
  [1, 2, 0, 5, 1],
  [2, 1, 3, 0, 4]
];

const modeConfigs = {
  valid: { pad: 0, outRows: 3, outCols: 3, desc: "Valid: No padding. Kernel stays within the boundaries. Shrinks output dimension." },
  same: { pad: 1, outRows: 5, outCols: 5, desc: "Same: Padded with 0s around edges. Output dimension perfectly matches original input shape." },
  full: { pad: 2, outRows: 7, outCols: 7, desc: "Full: Padded so the kernel just skims the corner elements. Expands output dimension." }
};

let currentMode = 'valid';
let isRunning = false;
let abortController = null;

const inputGrid = document.getElementById('inputGrid');
const outputGrid = document.getElementById('outputGrid');
const mathline = document.getElementById('mathline');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const paddingMode = document.getElementById('paddingMode');

function buildDisplay() {
  const conf = modeConfigs[currentMode];
  const pad = conf.pad;
  const totalRows = SRC_ROWS + (2 * pad);
  const totalCols = SRC_COLS + (2 * pad);

  // 1. Build Padded/Unpadded Input Configuration
  inputGrid.innerHTML = '';
  inputGrid.style.gridTemplateColumns = `repeat(${totalCols}, 32px)`;
  document.getElementById('inputTitle').textContent = `Input Image Area (${totalRows}×${totalCols})`;

  for (let r = 0; r < totalRows; r++) {
    for (let c = 0; c < totalCols; c++) {
      const cell = document.createElement('div');
      cell.id = `in-${r}-${c}`;
      
      // Determine if within original core boundaries or artificial padding zone
      const isOriginal = (r >= pad && r < pad + SRC_ROWS) && (c >= pad && c < pad + SRC_COLS);
      
      if (isOriginal) {
        cell.className = 'cell original';
        cell.textContent = baseImage[r - pad][c - pad];
      } else {
        cell.className = 'cell padded';
        cell.textContent = '0';
      }
      inputGrid.appendChild(cell);
    }
  }

  // 2. Build Resulting Output Shape Matrix
  outputGrid.innerHTML = '';
  outputGrid.style.gridTemplateColumns = `repeat(${conf.outCols}, 32px)`;
  document.getElementById('outputTitle').textContent = `Output Map Size (${conf.outRows}×${conf.outCols})`;

  for (let r = 0; r < conf.outRows; r++) {
    for (let c = 0; c < conf.outCols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `out-${r}-${c}`;
      cell.textContent = '?';
      outputGrid.appendChild(cell);
    }
  }
  
  mathline.textContent = conf.desc;
}

function clearHighlights() {
  document.querySelectorAll('.cell').forEach(c => {
    c.classList.remove('kernel-active', 'out-active');
  });
}

const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

async function animateSlidingWindow(signal) {
  isRunning = true;
  startBtn.disabled = true;
  paddingMode.disabled = true;

  const conf = modeConfigs[currentMode];
  
  for (let r = 0; r < conf.outRows; r++) {
    for (let c = 0; c < conf.outCols; c++) {
      if (signal.aborted) return;

      clearHighlights();

      // Highlight target output cell
      const outCell = document.getElementById(`out-${r}-${c}`);
      if (outCell) outCell.classList.add('out-active');

      // Light up the overlapping 3x3 window over the input grid field
      for (let kr = 0; kr < K_SIZE; kr++) {
        for (let kc = 0; kc < K_SIZE; kc++) {
          const targetRow = r + kr;
          const targetCol = c + kc;
          const inCell = document.getElementById(`in-${targetRow}-${targetCol}`);
          if (inCell) inCell.classList.add('kernel-active');
        }
      }

      mathline.textContent = `Processing sliding step at Output coordinate [Row: ${r}, Col: ${c}]`;
      await sleep(250);

      if (outCell) {
        outCell.textContent = '*'; // Signifies calculated value placement
        outCell.style.background = '#eeeeee';
      }
    }
  }

  clearHighlights();
  mathline.innerHTML = `<b>Animation Complete.</b> Output dimensions are successfully processed using <b>${currentMode.toUpperCase()}</b> padding configuration.`;
  isRunning = false;
  startBtn.disabled = false;
}

function handleReset() {
  if (abortController) {
    abortController.abort();
  }
  isRunning = false;
  startBtn.disabled = false;
  paddingMode.disabled = false;
  buildDisplay();
}

paddingMode.addEventListener('change', (e) => {
  currentMode = e.target.value;
  handleReset();
});

startBtn.addEventListener('click', () => {
  if (isRunning) return;
  abortController = new AbortController();
  animateSlidingWindow(abortController.signal);
});

resetBtn.addEventListener('click', handleReset);

// Initialize setup state
buildDisplay();
</script>

</body>
</html>
